planning:
  folder: "T:\\Planning"
  sheet: "PlanningMachine"

workday:
  start: "07:30"
  end: "23:30"

polling:
  interval_minutes: 10

thresholds:
  red_deficit: 10

email:
  enabled: true
  settings_attribute: "sys_email_planning_warning"
  yellow_cooldown_minutes: 120
  red_cooldown_minutes: 60

holidays:
  dates:
    # Festivita' Romania 2026
    - "2026-01-01"   # Anul Nou
    - "2026-01-02"   # Anul Nou (giorno 2)
    - "2026-01-24"   # Ziua Unirii Principatelor Romane
    - "2026-04-10"   # Vinerea Mare (Pastele ortodox)
    - "2026-04-13"   # Pastele ortodox (Lunea)
    - "2026-05-01"   # Ziua Muncii
    - "2026-06-01"   # Ziua Copilului
    - "2026-05-31"   # Rusaliile (Duminica)
    - "2026-06-01"   # Rusaliile (Lunea)
    - "2026-08-15"   # Adormirea Maicii Domnului
    - "2026-11-30"   # Sfantul Andrei
    - "2026-12-01"   # Ziua Nationala a Romaniei
    - "2026-12-25"   # Craciunul
    - "2026-12-26"   # Craciunul (giorno 2)

ui:
  enable_blinking_alerts: true

server:
  host: "0.0.0.0"
  port: 8085
