planning:
  folder: "T:\\Planning"
  sheet: "PlanningMachine"

workday:
  start: "07:30"
  end: "23:30"

polling:
  interval_minutes: 10

thresholds:
  red_deficit: 10

email:
  enabled: true
  settings_attribute: "sys_email_planning_warning"
  yellow_cooldown_minutes: 120
  red_cooldown_minutes: 60

holidays:
  dates:
    # Festivita' italiane 2026 (aggiungere/rimuovere secondo necessita')
    - "2026-01-01"   # Capodanno
    - "2026-01-06"   # Epifania
    - "2026-04-06"   # Lunedi dell'Angelo (Pasquetta)
    - "2026-04-25"   # Liberazione
    - "2026-05-01"   # Festa del Lavoro
    - "2026-06-02"   # Festa della Repubblica
    - "2026-08-15"   # Ferragosto
    - "2026-11-01"   # Ognissanti
    - "2026-12-08"   # Immacolata
    - "2026-12-25"   # Natale
    - "2026-12-26"   # Santo Stefano

ui:
  enable_blinking_alerts: true

server:
  host: "0.0.0.0"
  port: 8085
